/* Every target, not a hand-picked three: the whole point is to find the one you didn't know
   you were missing. Sorted worst-first so the top row IS the answer to "what am I short on".
   The strip separates "70% every single day" from "six good days and one blank" — the same
   average, completely different problem. */
function renderRunRate(){
  const n = daysLogged(runWindow());
  if(!n){ $('#runRate').innerHTML =
    `<div class="empty">No completed days logged in the last week — save a few plates and the run rate builds itself.</div>`;
    return; }
  const rows = SEQ_MAIN.map(fn=>{ const f=FOCUS[fn], {avg}=runRate(f.key);
    return {f, avg, pct: f.daily ? avg/f.daily*100 : 0}; })
    .filter(r=>r.f.daily)
    .sort((a,b)=>a.pct-b.pct);
  const worst = rows.filter(r=>r.pct < DEBT_TOL*100);
  const thin = n < DEBT_MIN_DAYS;    // don't call two days a pattern
  const names = worst.slice(0,3).map(r=>r.f.nm.toLowerCase()).join(', ')
              + (worst.length>3 ? ` +${worst.length-3} more` : '');
  const head = `<div class="rr-days">${n}/7 days logged · ` + (
    !worst.length ? `✓ every target on track across the window.` :
    thin ? `<b style="color:var(--warn)">short on ${names}</b> — but ${n} day${n===1?'':'s'} is an
            anecdote, not a run rate. Log ${DEBT_MIN_DAYS-n} more and this starts steering the
            builder and the menu.`
         : `<b style="color:var(--warn)">consistently short on ${names}</b> — the builder and the
            menu now push these.`) + `</div>`;
  $('#runRate').innerHTML = head + rows.map(r=>{
    const short = r.pct < DEBT_TOL*100, pct = Math.min(100, r.pct);
    // data-tip drives a CSS tooltip, not the native one: 5px of bar behind a browser hover delay
    // is a number you can technically get to and never actually read. The date leads — "Tue, 4.1g"
    // is a fact you can do something about, "4.1g" on its own is trivia.
    const cells = runSeries(r.f.key).map(({d,v})=>{
      if(v===null) return `<i class="blank" data-tip="${dayLabel(d)} · nothing logged"></i>`;
      const dp = r.f.daily ? v/r.f.daily*100 : 0;
      return `<i class="${dp < DEBT_TOL*100 ? 'short':''}" style="opacity:${Math.max(.25, Math.min(1, dp/100))}"
                 data-tip="${dayLabel(d)} · ${round1(v)}${r.f.unit} · ${Math.round(dp)}% of ${r.f.daily}${r.f.unit}"></i>`;
    }).join('');
    return `<div class="prog-lbl"><span>${r.f.nm} <span style="color:var(--muted)">/ ${r.f.daily}${r.f.unit} a day</span></span>
      <b>${round1(r.avg)}${r.f.unit} <span class="rr-pct ${short?'short':''}">· ${Math.round(r.pct)}%</span></b></div>
      <div class="bar"><i class="${short?'short':''}" style="width:${pct}%"></i></div>
      <div class="strip">${cells}</div>`;
  }).join('');
}

/* Reveal 7 more day-groups; fetch another 30-day chunk first if we've reached the edge of what's
   loaded. A fetch that returns no date we didn't already have means the table has nothing older —
   the only honest way to know, since the window is by date and the DB may simply start there. */
async function loadMoreDays(){
  if(state.loadingMore) return;
  const dates = new Set(state.saved.map(p=>p.date));
  const loadedOlder = state.saved.filter(p => p.date < yesterdayStr() && p.date !== state.day);
  if(new Set(loadedOlder.map(p=>p.date)).size > state.olderDays){ state.olderDays += 7; return renderSaved(); }
  if(state.exhausted) return;
  const older = shiftDay(state.since, -30);
  state.loadingMore = true; renderSaved();
  try{
    const plates = await api('plates?since='+older);
    state.exhausted = plates.every(p => dates.has(p.date));
    state.saved = plates; state.since = older;   // superset of the old window, never narrower
    if(!state.exhausted) state.olderDays += 7;
  }catch(e){ apiFail('load older plates', e); }
  state.loadingMore = false; render();
}

function renderSaved(){
  if(!state.saved.length){ $('#saved').innerHTML = `<div class="empty">No saved plates yet — build one and hit “Save plate to this day”.</div>`; return; }
  const byDate = {}; state.saved.forEach(p=>{ (byDate[p.date]=byDate[p.date]||[]).push(p); });
  const dates = Object.keys(byDate).sort().reverse();
  /* The panel is for "what did I just eat", not an archive — today and yesterday are the days you
     still act on. Everything older loads a week at a time so a year of logging isn't 1400 rows of
     DOM on every render. The selected day is always shown even when it's outside that window,
     otherwise picking an old date in the day bar silently shows nothing here. */
  const shown = dates.filter(d => d >= yesterdayStr() || d === state.day);
  const rest  = dates.filter(d => !shown.includes(d));
  const vis   = shown.concat(rest.slice(0, state.olderDays));
  const left  = rest.length - state.olderDays;
  $('#saved').innerHTML = vis.map(d=>`
    <div style="margin-bottom:14px">
      <div style="font-size:12.5px;color:var(--muted);margin-bottom:4px">${d}${d===state.day?' · <b style="color:var(--accent)">selected</b>':''}</div>
      ${byDate[d].map(p=>{
        const nm=id=>{const i=ING.find(x=>x.id===id); return i?i.nm:id;};
        const names = p.items.map(it=>{const i=ING.find(x=>x.id===it.id); return i?`${i.nm}${it.qty!==i.def?` ×${round1(it.qty)}`:''}`:'?';}).join(', ');
        const {chosen,bases} = composePlate(p.items.map(x=>x.id), p.meal);
        const dish = [...chosen.map(r=>r.name), ...bases.map(nm)].join(' + ');
        return `<div class="plate-item">
          <div class="pn"><b>${MEALS[p.meal].label}</b>${dish?` · <span style="font-weight:600">${dish}</span>`:''}<small>${round1(itemsTotal(p.items,'p'))}g P · ${Math.round(itemsTotal(p.items,'kcal'))} kcal · ${names}</small></div>
          <button class="add" data-edit="${p.id}" style="padding:5px 10px">Edit</button>
          <button class="add rm" data-del="${p.id}" style="padding:5px 9px">✕</button>
        </div>`; }).join('')}
    </div>`).join('') + (
      state.loadingMore ? `<div class="empty">Loading older days…</div>` :
      left>0 ? `<button class="add" id="moreDays" style="padding:6px 12px">Show ${Math.min(7,left)} older day${Math.min(7,left)===1?'':'s'} <span style="opacity:.6">· ${left} loaded</span></button>` :
      !state.exhausted ? `<button class="add" id="moreDays" style="padding:6px 12px">Load older days <span style="opacity:.6">· before ${state.since}</span></button>` :
      state.olderDays ? `<button class="add" id="fewerDays" style="padding:6px 12px">Collapse older days</button>` :
      `<div class="empty" style="margin-top:8px">That's every day on record.</div>`);
}

function renderMeals(){
  $('#meals').innerHTML = Object.entries(MEALS).map(([k,m])=>
    `<button class="tab ${state.meal===k?'on':''}" data-meal="${k}">${m.label}<span class="tab-sub"> · ${m.p}g protein</span></button>`).join('');
}

function unitFor(key){ const f=Object.values(FOCUS).find(x=>x.key===key); return f?f.unit:''; }
function nameFor(key){ const f=Object.values(FOCUS).find(x=>x.key===key); return f?f.nm.toLowerCase():key; }

// one compact suggestion/search row. key = nutrient to show contribution for; remaining drives the "≈N to finish" hint.
function suggRow(i, key, remaining){
  const ip=inPlate(i.id), qty=ip?ip.qty:i.def, per=delivered(i,key);
  const closeN=(!ip && remaining>0 && per>0)?Math.ceil(remaining/per):0;
  const bits=[];
  if(per) bits.push(`<b style="color:var(--accent)">+${round1(per*qty)}${unitFor(key)}</b>`);
  // A gated nutrient reads 0 — say so, and say what unlocks it. A silent zero looks like a bug
  // or, worse, like the food is worthless; the point is that the FORM is wrong, not the food.
  // Shown ALWAYS, not only when the gated nutrient happens to be the one you're filling: with an
  // empty plate activeGap() defaults to protein, so a key-conditional marker is invisible exactly
  // when you're browsing — which is when you need to know the row is only half-counted.
  if(i.needform) bits.push(
    `<b style="color:var(--warn)">${(i.gated||[]).map(nameFor).join('/')} needs ${i.needform}</b>`);
  const gq = gramsFor(i, qty);
  if(gq) bits.push(`<b>${gq} g</b>`);          // the real quantity, whatever the unit says
  bits.push(`${Math.round(i.n.kcal*qty)} kcal`);
  if(closeN) bits.push(`≈${closeN} ${i.unit}${closeN>1?'s':''} to finish`);
  if(i.note) bits.push(i.note);
  const dl = daysLeft(i.id);
  const dying = isDying(i.id)
    ? `<span class="buy" style="color:var(--accent);border-color:var(--accent)">${dl<=0?'use today':dl+'d left'}</span>` : '';
  return `<div class="srow ${ip?'inplate':''}">
    <div class="si">
      <div class="nm">${i.nm}${i.makes?'<span class="buy">prep</span>':(needsBuy(i)?'<span class="buy">buy</span>':'')}${dying}</div>
      <div class="meta">${bits.join(' · ')}</div>
    </div>
    <div class="stepper" data-id="${i.id}">
      <button data-act="dec">–</button>
      <input type="number" min="0" step="${stepFor(i)}" value="${qty}" data-id="${i.id}">
      <span class="unit">${i.unit}</span>
      <button data-act="inc">+</button>
    </div>
    ${ip? `<button class="add rm" data-rm="${i.id}" style="padding:6px 9px">✕</button>`
        : `<button class="add" data-add="${i.id}">Add</button>`}
  </div>`;
}

/* ---- dish search: name, cuisine, method, and the ingredients it's made of ----
   Matching on ingredients too means typing "tofu" surfaces the tofu dishes, not just the block
   of tofu — which is usually what you actually wanted. Dishes you can make from what's on hand
   rank first, then cheap ones, then ones that fit the meal you're on. */
function searchRecipes(q){
  const scored = RECIPES.map(r=>{
    const names = r.core.map(id=>{const i=ING.find(x=>x.id===id); return i?i.nm.toLowerCase():'';}).join(' ');
    const hitName = r.name.toLowerCase().includes(q);
    const hit = hitName || (r.cuisine||'').includes(q) || (r.method||'').toLowerCase().includes(q) || names.includes(q);
    if(!hit) return null;
    const have = r.core.filter(id=>haveNow(ING.find(x=>x.id===id))).length;
    return {r, s: (hitName?4:0) + have/Math.max(1,r.core.length)*2
                 + (fitsMeal(r,state.meal)?1:0) - r.effort/60};
  }).filter(Boolean).sort((a,b)=>b.s-a.s).slice(0,5);
  return scored.map(x=>x.r);
}
// what a dish puts on the plate: its core, plus the load-bearing part of its micro layer
// (sour → green → seed, max 3) — same rule the menu generator uses. Plain aromatics are skipped.
function dishItems(r){
  const core = r.core.filter(id=>ING.find(x=>x.id===id));
  const rank = id => { const i=ING.find(x=>x.id===id); if(!i) return 9;
    return i.role==='sour' ? 0 : i.green ? 1 : i.role==='seed' ? 2 : 4; };
  const opt = r.opt.filter(id=>{ const i=ING.find(x=>x.id===id); return i && rank(id) < 4 && !core.includes(id); })
                   .sort((a,b)=>rank(a)-rank(b)).slice(0,3);
  return [...core, ...opt];
}
function dishRow(r){
  const ids = dishItems(r);
  const p = ids.reduce((s,id)=>{const i=ING.find(x=>x.id===id); return s + (i?i.n.p*i.def:0);},0);
  const kc= ids.reduce((s,id)=>{const i=ING.find(x=>x.id===id); return s + (i?i.n.kcal*i.def:0);},0);
  const nm = id=>{const i=ING.find(x=>x.id===id); return i?i.nm:id;};
  // ids, not objects. Prep outputs are reachable, not shopping — same rule the ranking uses.
  const missing = ids.filter(id=>{const i=ING.find(x=>x.id===id); return i && !(haveNow(i)||i.makes);});
  // What this dish actually saves, soonest-to-turn first. Named with the clock, because "beetroot"
  // is a fact and "beetroot, 2d" is a reason to cook this tonight instead of scrolling on.
  const saves = ids.filter(id=>urgency(id) > 0).sort((a,b)=>daysLeft(a)-daysLeft(b));
  const clock = d => d <= 0 ? 'today' : `${d}d`;
  // only render what we actually know — a hand-saved recipe has no effort/cuisine, and
  // "undefinedm · undefined" is worse than showing nothing
  const tags = [];
  if(r.effort)  tags.push(`${r.effort}m`);
  if(r.cuisine) tags.push(r.cuisine);
  const chips = (tags.length?`<span class="cap">${tags.join(' · ')}</span>`:'')
              + (r.user?`<span class="cap">yours</span>`:'');
  return `<div class="srow">
    <div class="si">
      <div class="nm">${r.name} ${chips}</div>
      <div class="meta"><b style="color:var(--accent)">+${round1(p)}g protein</b> · ${Math.round(kc)} kcal${r.method?` · ${r.method}`:''}</div>
      <div class="meta" style="margin-top:2px">adds: ${ids.map(nm).join(', ')}</div>
      ${saves.length?`<div class="meta" style="color:var(--accent)">uses up: ${saves.map(id=>`${nm(id)} (${clock(daysLeft(id))})`).join(', ')}</div>`:''}
      ${missing.length?`<div class="meta" style="color:var(--warn)">buy ${missing.length}: ${missing.map(nm).join(', ')}${saves.length?' — and the rest is already in your fridge':''}</div>`:''}
    </div>
    <button class="add" data-adddish="${r.id}">Add dish</button>
  </div>`;
}
function addDish(id){
  const r = RECIPES.find(x=>x.id===id); if(!r) return;
  dishItems(r).forEach(iid=>{
    if(inPlate(iid)) return;                       // already there — don't stack a second portion
    const i = ING.find(x=>x.id===iid);
    if(i) state.plate.push({id:iid, qty:i.def});
  });
  clearSearch();
  render();
}

// Opening suggestions for an empty plate — the same signals the menu generator scores on, but
// for ONE meal: history affinity (looks like your eating) + rescue (uses something about to spoil)
// − monotony (ingredients eaten lately, protein hero weighted) − effort. Returns whole dishes.
function suggestDishes(meal, n=3){
  const cand = RECIPES.filter(r=> fitsMeal(r,meal) && dishItems(r).length);
  const days = new Set(state.saved.map(p=>p.date)).size || 1;
  const freq = {};
  state.saved.forEach(p=>p.items.forEach(it=>{ freq[it.id]=(freq[it.id]||0)+1; }));
  const score = r=>{
    const items = dishItems(r);
    const aff    = items.reduce((s,id)=> s + (freq[id]||0)/days, 0) / Math.max(1,items.length);
    const rescue = items.reduce((s,id)=> s + urgency(id), 0);
    let mono=0, w=0;
    r.core.forEach(id=>{ const i=ING.find(x=>x.id===id); const wt=i&&i.role==='protein'?2:1; mono+=wt*recentUse(id); w+=wt; });
    mono = w ? mono/w : 0;
    /* Pantry readiness. A penalty, not a filter — a shoppable dish stays visible as "here's what
       a shop unlocks". Prep outputs count as reachable: soaked rajma is rajma you own plus a
       night's lead, not a trip to the store.

       Counted as ITEMS SHORT, not fraction short. A fraction made a 3-item dish missing one thing
       look worse than a 10-item dish missing three, when the actual ask — one stop, one item — is
       the smaller one. What you weigh when deciding is how many things you have to go buy.

       And a rescue forgives the first two of them. That is the whole point of this pass: the old
       scoring punished exactly the dish that would save a dying beetroot because it also needed a
       capsicum, so nothing got cooked and the beetroot rotted anyway. Two items is a corner-shop
       errand; letting that block a rescue is how food dies in the fridge. */
    const ids = dishItems(r);
    const missing = ids.filter(id=>{const i=ING.find(x=>x.id===id); return !(i && (haveNow(i)||i.makes));}).length;
    const forgiven = rescue >= 0.5 ? 2 : 0;
    const short = Math.max(0, missing - forgiven);
    return 0.35*aff + 1.1*rescue - 0.6*mono - (r.effort||15)/60 - 0.5*short;
  };
  return cand.map(r=>({r,s:score(r)})).sort((a,b)=>b.s-a.s).slice(0,n).map(x=>x.r);
}

function renderBuilder(){
  const el=$('#builder'), q=(state.query||'').trim().toLowerCase();

  // --- SEARCH mode: matches DISHES and ingredients. Typing "shakshuka" or "greek" or even
  //     "tofu" should find the dish, not just the raw item — one tap drops the whole plate in.
  if(q){
    const ag=activeGap();
    const dishes = searchRecipes(q);
    // Explicit search is explicit intent: show every match, badge what you don't have.
    // (Unprompted suggestions still respect the pantry — see the suggest path below.)
    const m=ING.filter(i=>i.nm.toLowerCase().includes(q))
      .sort((a,b)=> Math.abs(delivered(a,ag.key)*a.def - ag.remaining) - Math.abs(delivered(b,ag.key)*b.def - ag.remaining));

    let html='';
    if(dishes.length){
      html += `<div class="rlbl">Dishes</div>` + dishes.map(dishRow).join('');
    }
    if(m.length){
      html += `<div class="rlbl" style="margin-top:${dishes.length?'14px':'0'}">Ingredients</div>`
            + m.map(i=>suggRow(i,ag.key,ag.remaining)).join('');
    }
    el.innerHTML = html || `<div class="empty">Nothing matches “${q}”. ${!state.showBuy?'<a href="#" id="searchBuy">Include buy-list?</a>':''}</div>`;
    return;
  }

  // --- START step: empty plate → OPEN WITH MEAL-APPROPRIATE SUGGESTIONS, not a blank slate ---
  if(!state.plate.length){
    const mealLabel = MEALS[state.meal].label.toLowerCase();
    const dishes = suggestDishes(state.meal, 3);          // menu-style: whole dishes for THIS meal
    // fallback single protein base if no dish is tagged for this meal (rotation-aware, ready-now)
    const pT = MEALS[state.meal].p;
    const basePick = BASES.map(id=>ING.find(x=>x.id===id))
      .filter(i=>i && i.role==='protein' && haveNow(i))
      .sort((a,b)=> (isDying(b.id)-isDying(a.id)) || ((a.lead||0)-(b.lead||0))
                 || (recentUse(a.id)-recentUse(b.id)) || ((b.n.p||0)-(a.n.p||0)))[0];
    const tiles=BASES.map(id=>{const i=ING.find(x=>x.id===id); return i?`<button class="tab" data-add="${id}">${i.nm}</button>`:'';}).join('');
    el.innerHTML=`
      ${plannedSection()}
      <p class="focus-note">Start your <b>${mealLabel}</b> — suggested for you (one tap drops the whole dish):</p>
      ${dishes.length ? dishes.map(dishRow).join('')
                      : (basePick?suggRow(basePick,'p',pT):'')}
      <p class="focus-note" style="margin-top:14px">…or start from a base</p>
      <div class="base-tiles">${tiles}</div>
      <p class="focus-note" style="margin-top:14px">…or search above to add anything specific.</p>`;
    return;
  }

  // --- GAP step: what's missing next ---
  const active = activeFocus();

  // optional tray — daily/weekly nutrients + green/probiotic, judged against the WHOLE DAY (✓ = day already covered).
  // Ordered by the trailing week's debt, not CSV order: what you keep missing should be the first
  // thing your thumb lands on, and it carries the % so you can see how bad the drift is.
  const optChips = seqOpt().slice().sort((a,b)=>debtMap()[b]-debtMap()[a]).map(fn=>{const g=FOCUS[fn];
    const {avg,days}=runRate(g.key);
    const tag = (inDebt(fn) && !optMet(fn)) ? ` <span class="debt">${Math.round(avg/g.daily*100)}% 7d</span>` : '';
    return `<button class="gap-chip ${fn===active?'on':''}" data-focus="${fn}">${optMet(fn)?'✓ ':''}${g.nm}${tag}</button>`;}).join('');
  const funcChips = [['green','Green'],['probiotic','Probiotic']].map(([p,label])=>{const has=dayHas(p);
    return `<span class="gap-chip" style="cursor:default;opacity:${has?'1':'.55'}">${has?'✓ ':'○ '}${label}</span>`;}).join('');
  const optTray = `<div class="gap-chips"><span class="lbl">Across the day — add if the day is short (✓ = day covered)</span>${optChips}${funcChips}</div>`;

  if(!active){
    // Every per-meal gate is met — but "balanced plate" is not "balanced week". If the record
    // says something has been missing for days, this is the last moment it can still be fixed.
    const owed = seqOpt().filter(fn=>inDebt(fn) && !optMet(fn)).sort((a,b)=>debtMap()[b]-debtMap()[a])[0];
    const nudge = owed ? `<p class="focus-note">The week is running short on <b>${FOCUS[owed].nm.toLowerCase()}</b>
      (${Math.round(runRate(FOCUS[owed].key).avg/FOCUS[owed].daily*100)}% of target over the last 7 days)
      and today hasn't covered it — <span class="radd-link" data-focus="${owed}">add some now</span>.</p>` : '';
    el.innerHTML=`<div class="balanced">✓ Per-meal essentials covered — <b>Save plate</b> when ready.</div>${nudge}${optTray}`;
    return;
  }
  const f=FOCUS[active], key=f.key, optional=!f.permeal;
  // optional nutrients fill against TODAY's share (weekly ones = daily = 1/7 of the week); required = this meal
  let target, got;
  if(optional){ target = f.daily; got = dayGot(key); }
  else { target = targetFor(active); got = plateTotal(key); }
  const remaining=Math.max(0,target-got), pct=Math.min(100, target?got/target*100:0);

  // category-free: any pantry item that provides this nutrient, ranked by how close its default serving gets to the gap
  let sugg=ING.filter(i=>(i.pantry||state.showBuy) && !inPlate(i.id) && delivered(i,key)>0);
  // fit to the gap, but let something about to spoil jump the queue — a dying bunch of spinach
  // is a better answer than a perfect-fit item that will still be there next week
  // …but something eaten a lot in the last few days sinks down the list — so you rotate sources
  // instead of adding eggs to a fourth meal. Capped below the freshness bonus, so a dying item
  // still wins (using up a perishable beats variety).
  // …and among equal fits, the one that also carries what the WEEK has been missing rises: a
  // chronic iron gap should get closed by the greens you were adding for folate anyway. Ranked
  // below freshness (a perishable is a deadline; debt is a drift) and above the variety penalty.
  // …and something you don't actually have sinks below something you do. A penalty, not a filter:
  // the answer to a gap nothing in the kitchen closes is still "buy this", so it stays visible —
  // it just stops outranking food already on the shelf. Sized above the variety penalty (0.2×2)
  // and below the freshness bonus (0.6), so a dying ingredient still beats a shopping trip.
  const fit=i=>Math.abs(delivered(i,key)*i.def - remaining)
              - (isDying(i.id)?remaining*0.6:0)
              - debtBonus(i)*remaining*0.4
              + Math.min(recentUse(i.id),2)*remaining*0.2
              + (needsBuy(i)?remaining*0.5:0);
  sugg.sort((a,b)=> fit(a)-fit(b));
  const LIMIT=3, shown=state.expand?sugg:sugg.slice(0,LIMIT), moreN=sugg.length-shown.length;

  const reqGaps=seqReq().filter(underTarget);
  const reqChips=reqGaps.map(fn=>{const g=FOCUS[fn], need=round1(targetFor(fn)-plateTotal(g.key));
    return `<button class="gap-chip ${fn===active?'on':''}" data-focus="${fn}">${g.nm} <span style="opacity:.7">−${need}${g.unit}</span></button>`;}).join('');
  const reqTray = reqChips ? `<div class="gap-chips"><span class="lbl">Still missing — tap to switch</span>${reqChips}</div>` : '';

  el.innerHTML=`
    <div class="gap-head">
      <span class="big">Add ${f.nm.toLowerCase()}${optional?` <span style="font-size:12px;color:var(--muted);font-weight:400">· optional · ${f.cad==='week'?"today's share (weekly)":'today'}</span>`:''}</span>
      <span style="color:var(--muted);font-size:13px">${round1(got)}/${target}${f.unit} · need ${round1(remaining)}</span>
    </div>
    <p class="focus-note">${f.blurb}</p>
    <div class="bar"><i style="width:${pct}%"></i></div>
    <div style="margin-top:14px">${shown.map(i=>suggRow(i,key,remaining)).join('') || `<div class="empty">Nothing in pantry for this — try search${!state.showBuy?' or the buy-list toggle':''}.</div>`}</div>
    ${moreN>0?`<button class="more-btn" id="moreBtn">＋ ${moreN} more option${moreN>1?'s':''}</button>`:''}
    ${(state.expand && sugg.length>LIMIT)?`<button class="more-btn" id="moreBtn">– show fewer</button>`:''}
    ${reqTray}${optTray}
    <label class="toggle" style="margin-top:14px"><input type="checkbox" id="buyToggle" ${state.showBuy?'checked':''}> include buy-list items</label>`;
}

function renderPlate(){
  const el = $('#plate');
  if(!state.plate.length){ el.innerHTML = `<div class="empty">Empty — add something from the suggestions.</div>`; return; }
  el.innerHTML = state.plate.map(it=>{
    const i = ING.find(x=>x.id===it.id);
    return `<div class="plate-item">
      <div class="pn">${i.nm}<small>${gramsFor(i,it.qty)?gramsFor(i,it.qty)+' g · ':''}${round1(i.n.p*it.qty)}g protein · ${Math.round(i.n.kcal*it.qty)} kcal</small></div>
      <div class="stepper" data-id="${i.id}">
        <button data-act="dec">–</button>
        <input type="number" min="0" step="${stepFor(i)}" value="${it.qty}" data-id="${i.id}">
        <span class="unit" title="${i.grams?`1 ${i.unit} = ${i.grams} g`:''}">${i.unit}</span>
        <button data-act="inc">+</button>
      </div>
      <button class="add rm" data-rm="${i.id}" style="padding:6px 9px">✕</button>
    </div>`;
  }).join('');
}

function renderTotals(){
  // every tracked nutrient, grouped by cadence — bar vs full daily/weekly target (not the meal share)
  let html = '', lastCad = null;
  Object.entries(FOCUS).forEach(([fn,f])=>{
    if(f.cad!==lastCad){ html += `<div class="cad-sep" style="margin-top:14px">${CAD_LABEL[f.cad]}</div>`; lastCad=f.cad; }
    const tgt = f.cad==='meal' ? MEALS[state.meal].p : DAILY[f.key];
    const got = plateTotal(f.key), pct=Math.min(100,got/tgt*100);
    return html += `<div class="prog-lbl"><span>${f.nm} <span style="color:var(--muted)">/ ${tgt}${f.unit}</span></span><b>${round1(got)}${f.unit}</b></div>
      <div class="bar"><i class="${got>tgt&&f.cad==='meal'?'over':''}" style="width:${pct}%"></i></div>`;
  });
  $('#totals').innerHTML = html +
    `<div class="prog-lbl" style="margin-top:14px"><span>Calories <span style="color:var(--muted)">/ ${MEALS[state.meal].kcal} kcal ${MEALS[state.meal].label.toLowerCase()}</span></span><b>${Math.round(plateTotal('kcal'))} kcal</b></div>`;
}

function renderFlags(){
  // per-meal contextual nudge only — iron absorbs far better with a sour/vit-C on the SAME plate
  const ironPresent = plateTotal('fe')>=2;
  // partner present if there's a sour-role item (lemon/wedge) OR a real vit-C source (tomato ≥15mg etc.)
  const vitcPartner = plateTotal('vc')>=15 ||
    state.plate.some(it=>{const i=ING.find(x=>x.id===it.id); return i && i.role==='sour';});
  $('#flags').innerHTML = (ironPresent && !vitcPartner)
    ? `<span class="flag miss">⚠ iron on this plate, no sour — add lemon/tomato for absorption</span>` : '';
}

function renderReminders(){
  const supp = NONFOOD.map(x=>`<span class="flag">${x.nm} <span style="opacity:.7">· ${x.cad}</span></span>`).join(' ');
  $('#reminders').innerHTML = `
    <div style="margin-bottom:8px"><b>Not from food — track separately:</b></div>
    <div class="flags" style="margin:0 0 12px">${supp}</div>
    <b>Weekly:</b> soya ≤3× · rotate greens/colours · resistance training 2–3×.<br>
    <b>Monthly:</b> D3 dose · blood test (once) · weigh-in vs 0.3–0.5 kg/wk.<br>
    <span style="color:var(--warn)"><b>Iron rule:</b> keep tea/coffee ≥1 h from dal/greens.</span>`;
}

/* ============ UTILS ============ */
function round1(x){ return Math.round(x*10)/10; }
/* Half steps everywhere. The unit ("cup", "medium") is a label; the GRAMS are the real
   quantity, and no unit is so precise that half of it is meaningless. Being able to say
   "half an onion" matters more than keeping whole numbers tidy. */
function stepFor(i){ return 0.5; }
// what this quantity actually weighs — the number to trust when the unit label is vague
function gramsFor(i, qty){ return (i.grams||0) > 0 ? Math.round(i.grams*qty) : 0; }
function nextFocus(){ const s=seq(), i=s.indexOf(state.focus); for(let j=i+1;j<s.length;j++){ return s[j]; } return null; }

/* ============ EVENTS ============ */
/* A search is a question, and adding the thing answers it — so the query has to go, or the
   builder stays frozen on "tofu" and the next tap has to clear it by hand first. One helper
   because there are THREE ways to add and they kept drifting: the Add button, a whole dish, and
   the quantity stepper. The stepper was the one that got missed — tapping + on a search result
   puts the item on the plate just as much as Add does. */
function clearSearch(){
  state.expand=false; state.query='';
  const si=$('#search'); if(si) si.value='';
}
function addItem(id){ if(!inPlate(id)){ const i=ING.find(x=>x.id===id); state.plate.push({id, qty:i.def}); }
  clearSearch();
  render(); }
function rmItem(id){ state.plate = state.plate.filter(p=>p.id!==id); render(); }
function setQty(id, qty){
  qty = Math.max(0, Number(qty)||0);
  if(qty===0){ rmItem(id); return; }
  const ip=inPlate(id); if(ip){ ip.qty=qty; }
  // only the ADD transition clears the search — nudging the quantity of something already on the
  // plate is an edit, not an answer, and wiping the results mid-adjust would be the annoying bug.
  else { state.plate.push({id,qty}); clearSearch(); }
  render();
}

document.addEventListener('click', e=>{
  const t=e.target;
  if(t.dataset.meal){ state.meal=t.dataset.meal; state.focus='protein'; render(); }
  else if(t.dataset.focus){ state.focus=t.dataset.focus; state.expand=false; renderBuilder(); }
  else if(t.dataset.loadslot){ loadSlot(t.dataset.loadslot); }
  else if(t.dataset.prepdone){ prepDone(t.dataset.prepdone); }
  else if(t.dataset.adddish){ addDish(t.dataset.adddish); }
  else if(t.dataset.add){ addItem(t.dataset.add); }
  else if(t.dataset.rm){ rmItem(t.dataset.rm); }
  else if(t.dataset.act){ // stepper +/-
    const box=t.closest('.stepper'); const id=box.dataset.id; const inp=box.querySelector('input');
    const step=Number(inp.step)||1; let v=Number(inp.value)||0;
    v = t.dataset.act==='inc'? v+step : v-step;
    setQty(id, round1(v));
  }
  else if(t.id==='moreBtn'){ state.expand=!state.expand; renderBuilder(); }
  else if(t.id==='searchBuy'){ e.preventDefault(); state.showBuy=true; renderBuilder(); }
  else if(t.id==='reset'){ state.plate=[]; state.focus='protein'; clearSearch(); render(); }
  else if(t.id==='savePlate'){ savePlate(); }
  else if(t.id==='recipeAdd'){ state.savingRecipe=true; renderRecipeSave(); }
  else if(t.id==='recipeCancel'){ state.savingRecipe=false; renderRecipeSave(); }
  else if(t.id==='recipeConfirm'){ const el=$('#recipeName'); saveAsRecipe(el?el.value:''); }
  else if(t.dataset.hz){ state.horizon=t.dataset.hz; renderHorizon(); }
  else if(t.id==='moreDays'){ loadMoreDays(); }
  else if(t.id==='fewerDays'){ state.olderDays = 0; renderSaved(); }
  else if(t.dataset.delrecipe){ delRecipe(t.dataset.delrecipe); }
  else if(t.dataset.edit){ editPlate(t.dataset.edit); }
  else if(t.dataset.del){ delPlate(t.dataset.del); }
});
document.addEventListener('change', e=>{
  if(e.target.matches('input[type=number]')){ setQty(e.target.dataset.id, e.target.value); }
  if(e.target.id==='buyToggle'){ state.showBuy=e.target.checked; renderBuilder(); }
  if(e.target.id==='dayInput'){ state.day=e.target.value||todayStr(); render(); }
});
document.addEventListener('input', e=>{
  if(e.target.id==='search'){ state.query=e.target.value; renderBuilder(); } // only rebuild builder → search box keeps focus
});

/* ============ INIT — load from the API, then render ============ */
// One-time lift of a browser's old localStorage into the DB, so upgrading doesn't drop history.
async function migrateLocal(){
  if(localStorage.getItem('mp.migrated')) return;
  let plates=[], recipes=[];
  try{ plates = JSON.parse(localStorage.getItem('mp.saved'))||[]; }catch(e){}
  try{ recipes = JSON.parse(localStorage.getItem('mp.recipes'))||[]; }catch(e){}
  if(!plates.length && !recipes.length){ localStorage.setItem('mp.migrated','1'); return; }
  try{
    const r = await api('import', {plates, recipes});
    localStorage.setItem('mp.migrated','1');
    console.log(`migrated ${r.plates} plates + ${r.recipes} recipes from this browser into the DB`);
  }catch(e){ console.warn('localStorage migration deferred —', e.message); } // retry next load
}

async function init(){
  try{
    await migrateLocal();
    const [data, plates, menu, stock] = await Promise.all([
      api('data'), api('plates?since='+state.since), api('menu'), api('stock')]);
    buildData(data);
    state.saved = plates; MENU = menu; STOCK = stock;
    render();
    initSheet();
  }catch(e){
    document.querySelector('.wrap').innerHTML =
      `<div class="panel"><h2>Can't reach the planner API</h2>
       <p style="color:var(--muted)">This app needs <code>app.py</code> running — it serves the data and stores your plates in SQLite.</p>
       <pre style="background:var(--chip);padding:12px;border-radius:8px;overflow:auto">cd meal-system
