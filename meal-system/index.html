<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Pantry-driven, protein-gated meal planner. Build a plate, see nutrient gaps fill in real time, and track your run rate on every nutrient.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥗</text></svg>">
<title>Balanced Meal Planner</title>
<style>
  :root{
    --bg:#faf9f6; --panel:#fff; --ink:#1c1b19; --muted:#6b6a66; --line:#e7e5df;
    --accent:#3a7d44; --accent-soft:#e6f0e8; --warn:#b5651d; --bar-bg:#eceae4;
    --chip:#f1efe9; --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  }
  @media (prefers-color-scheme:dark){
    :root{--bg:#16171a;--panel:#1f2125;--ink:#e9e7e2;--muted:#9a988f;--line:#2e3136;
      --accent:#6fbf7a;--accent-soft:#22302493;--warn:#d9944a;--bar-bg:#2a2c30;--chip:#26282c;
      --shadow:0 1px 3px rgba(0,0,0,.4);}
  }
  :root[data-theme=dark]{--bg:#16171a;--panel:#1f2125;--ink:#e9e7e2;--muted:#9a988f;--line:#2e3136;
    --accent:#6fbf7a;--accent-soft:#22302493;--warn:#d9944a;--bar-bg:#2a2c30;--chip:#26282c;--shadow:0 1px 3px rgba(0,0,0,.4);}
  :root[data-theme=light]{--bg:#faf9f6;--panel:#fff;--ink:#1c1b19;--muted:#6b6a66;--line:#e7e5df;
    --accent:#3a7d44;--accent-soft:#e6f0e8;--warn:#b5651d;--bar-bg:#eceae4;--chip:#f1efe9;--shadow:0 1px 3px rgba(0,0,0,.06);}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
  .wrap{max-width:1040px;margin:0 auto;padding:20px 16px 80px}
  h1{font-size:20px;margin:0 0 2px}
  .sub{color:var(--muted);font-size:13px;margin:0 0 18px}
  .cols{display:grid;grid-template-columns:1fr 340px;gap:18px;align-items:start}
  /* One column on mobile. The two column wrappers go display:contents so every panel becomes a
     direct grid child and can be reordered across them — otherwise `order` only sorts panels
     within their own column. Saved plates belongs after the day's numbers on a phone: you read
     what the plate did, then what the day totals, and only then look back at what you logged. */
  @media(max-width:820px){
    .cols{grid-template-columns:1fr}
    .cols>.col{display:contents}
    .p-saved{order:1}
    .p-tail{order:2}
  }
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;box-shadow:var(--shadow);margin-bottom:16px}
  .panel h2{font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:0 0 12px}
  /* meal + focus tabs */
  .tabs{display:flex;flex-wrap:wrap;gap:8px}
  .tab{border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:999px;
    padding:7px 14px;font-size:13px;cursor:pointer;transition:.15s}
  .tab:hover{border-color:var(--accent)}
  .tab.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
  .focus-tabs{margin-top:4px}
  /* On a phone the four meal pills wrapped to four rows, spending a third of the first screen on
     a target you already know. The gram figure is reference, not a choice — it goes, the choice
     stays, and the row fits across. */
  @media(max-width:560px){
    .tabs{gap:6px}
    #meals{display:grid;grid-template-columns:repeat(4,1fr)}
    #meals .tab{padding:7px 2px;font-size:12.5px;text-align:center}
    #meals .tab-sub{display:none}
  }
  .cad-sep{flex-basis:100%;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:8px 0 0}
  .cad-sep:first-child{margin-top:0}
  .focus-tab{position:relative}
  .focus-tab.done::after{content:"✓";position:absolute;top:-6px;right:-2px;background:var(--accent);color:#fff;
    width:16px;height:16px;border-radius:50%;font-size:10px;line-height:16px;text-align:center}
  .focus-tab.locked{opacity:.45}
  /* focus header */
  .focus-head{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:4px}
  .focus-head .big{font-size:17px;font-weight:600}
  .focus-note{font-size:13px;color:var(--muted);margin:0 0 14px}
  /* cards */
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media(max-width:560px){.cards{grid-template-columns:1fr}}
  .card{border:1px solid var(--line);border-radius:10px;padding:11px 12px;display:flex;flex-direction:column;gap:8px}
  .card.inplate{border-color:var(--accent);background:var(--accent-soft)}
  .card .nm{font-weight:600;font-size:14px}
  .card .meta{font-size:12px;color:var(--muted)}
  .card .contrib{font-size:12.5px;color:var(--accent);font-weight:600}
  .card .buy{font-size:11px;color:var(--warn);font-weight:600}
  .row{display:flex;align-items:center;gap:8px;margin-top:auto}
  .stepper{display:flex;align-items:center;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .stepper button{border:0;background:var(--chip);color:var(--ink);width:26px;height:28px;font-size:15px;cursor:pointer}
  .stepper input{width:44px;height:28px;border:0;background:var(--panel);color:var(--ink);text-align:center;font-size:13px}
  .stepper .unit{font-size:11px;color:var(--muted);padding:0 8px 0 2px}
  .add{margin-left:auto;border:0;background:var(--accent);color:#fff;border-radius:8px;padding:7px 12px;font-size:13px;font-weight:600;cursor:pointer}
  .add.rm{background:transparent;color:var(--warn);border:1px solid var(--line)}
  .hint{font-size:11.5px;color:var(--warn)}
  /* progress */
  .bar{height:8px;background:var(--bar-bg);border-radius:6px;overflow:hidden;margin:5px 0}
  .bar > i{display:block;height:100%;background:var(--accent);border-radius:6px;transition:width .25s}
  .bar > i.over{background:var(--warn)}
  .bar > i.short{background:var(--warn)}   /* under target — same warn colour, opposite meaning to .over */
  .prog-lbl{display:flex;justify-content:space-between;font-size:12.5px;margin-top:6px}
  .prog-lbl b{font-weight:600}
  /* plate */
  .plate-item{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px}
  .plate-item:last-child{border-bottom:0}
  .plate-item .pn{flex:1;min-width:0}
  .plate-item .pn small{color:var(--muted);display:block}
  .empty{color:var(--muted);font-size:13px;font-style:italic}
  .flags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .flag{font-size:11.5px;padding:3px 9px;border-radius:999px;background:var(--chip);color:var(--muted)}
  .flag.ok{background:var(--accent-soft);color:var(--accent);font-weight:600}
  .flag.miss{color:var(--warn)}
  .totals .prog-lbl{margin-top:10px}
  /* Horizon switch. Only the selected pane is in flow — the other two stay rendered so switching
     is instant and never re-reads the DB. */
  .seg{display:flex;gap:2px;background:var(--line);padding:2px;border-radius:8px;margin:2px 0 4px}
  .seg button{flex:1;font:inherit;font-size:12.5px;padding:6px 4px;border:0;border-radius:6px;
    background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap}
  .seg button.on{background:var(--panel);color:var(--ink);font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,.12)}
  .hz{display:none}
  .hz.on{display:block}
  /* Desktop: an ordinary panel. The sheet chrome only exists below 820px. */
  .sheet-grip{cursor:default}
  .grip-bar,.sheet-sum{display:none}
  @media(max-width:820px){
    /* Collapsing CLAMPS THE HEIGHT; it does not translate the sheet down past the fold. An
       off-screen transform depends on viewport maths the browser moves under you — the address
       bar showing/hiding on scroll changes vh, and the sheet ends up parked out of sight. A
       clamped height cannot leave the screen: worst case it is the grip. dvh (vh fallback) for
       the same reason — it tracks the address bar instead of fighting it. */
    #platePanel{position:fixed;left:0;right:0;bottom:0;z-index:30;margin:0;
      border-radius:14px 14px 0 0;border-bottom:0;display:flex;flex-direction:column;
      padding:0 14px calc(14px + env(safe-area-inset-bottom));
      box-shadow:0 -3px 18px rgba(0,0,0,.18);
      overflow:hidden;max-height:var(--peek,70px);transition:max-height .22s ease}
    #platePanel.open{max-height:78vh;max-height:78dvh}
    #platePanel.dragging{transition:none}
    .sheet-grip{position:relative;padding:8px 0 10px;cursor:pointer;touch-action:none;
      background:var(--panel);border-radius:14px 14px 0 0}
    .grip-bar{display:block;width:36px;height:4px;border-radius:2px;background:var(--line);margin:0 auto 8px}
    .sheet-sum{display:block;font-size:12.5px;color:var(--muted);margin-top:2px}
    .sheet-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
    /* the sheet floats over the page — give the last panel room to clear the peek */
    .wrap{padding-bottom:96px}
  }
  .next-btn{width:100%;margin-top:14px;border:0;background:var(--accent);color:#fff;border-radius:10px;padding:11px;font-size:14px;font-weight:600;cursor:pointer}
  .next-btn:disabled{opacity:.4;cursor:default}
  .reminders{font-size:12.5px;color:var(--muted);line-height:1.7}
  .reminders b{color:var(--ink)}
  .toggle{font-size:12.5px;color:var(--muted);margin-left:auto;display:flex;align-items:center;gap:6px;cursor:pointer}
  .topbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .reset{margin-left:auto;font-size:12px;color:var(--muted);background:none;border:1px solid var(--line);border-radius:8px;padding:5px 10px;cursor:pointer}
  .done-banner{background:var(--accent-soft);border:1px solid var(--accent);border-radius:10px;padding:12px;font-size:13.5px;margin-bottom:12px}
  /* search + guided suggestions */
  .search{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:var(--panel);color:var(--ink);font:inherit;margin-bottom:16px}
  .search:focus{outline:none;border-color:var(--accent)}
  .srow{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
  .srow:last-child{border-bottom:0}
  .srow.inplate .nm{color:var(--accent)}
  .srow .si{flex:1;min-width:0}
  .srow .nm{font-weight:600;font-size:14px}
  .srow .meta{font-size:12px;color:var(--muted)}
  /* The stepper + Add are ~230px of fixed furniture. On a phone that left the name column about
     130px wide, so "Multigrain bread" wrapped a word per line and one row ate a third of the
     screen. Below 560px the name takes the full width and the controls get their own line —
     the name is what you read, the controls are what you press, and neither has to fight. */
  @media(max-width:560px){
    .srow{flex-wrap:wrap;gap:8px}
    .srow .si{flex:1 0 100%}
    .srow .stepper{margin-left:0}
    .srow .add{margin-left:auto}
  }
  .buy{font-size:10px;color:var(--warn);border:1px solid var(--warn);border-radius:4px;padding:0 4px;margin-left:6px;vertical-align:middle;text-transform:uppercase;letter-spacing:.03em}
  .gap-head{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:2px}
  .gap-head .big{font-size:16px;font-weight:600}
  .gap-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:16px}
  .gap-chips .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;width:100%}
  .gap-chip{font-size:12px;border:1px solid var(--line);border-radius:999px;padding:4px 10px;cursor:pointer;color:var(--muted);background:var(--panel)}
  .gap-chip.on{border-color:var(--accent);color:var(--accent);font-weight:600;background:var(--accent-soft)}
  .gap-chip .debt{color:var(--warn);font-weight:600}
  /* run rate — the trailing record. The strip is one cell per day, oldest left. */
  .rr-days{font-size:12.5px;color:var(--muted);margin-bottom:10px}
  /* padding + content-box clip: the bar still READS as 5px, but the hoverable box is 17px.
     Aiming at a 5px target with a mouse is the reason the old native tooltip went unread. */
  .strip{display:flex;gap:2px;margin-top:-2px;position:relative}
  /* content-box is load-bearing — the global border-box would fold the padding INTO the 5px and
     leave a zero-height content box, i.e. an invisible strip. */
  .strip i{flex:1;box-sizing:content-box;height:5px;padding:6px 0;background-clip:content-box;
           border-radius:1px;background-color:var(--accent);opacity:.75;position:relative;cursor:default}
  .strip i.short{background-color:var(--warn)}
  .strip i.blank{background-color:var(--line);opacity:1}
  .strip i:hover{opacity:1}
  /* the tooltip. Fires instantly — the whole point is reading seven days in one sweep, which a
     ~1s native delay per cell makes impossible. */
  .strip i[data-tip]:hover::after{
    /* below, not above: above would cover the very bar you're reading the cell against. */
    content:attr(data-tip);position:absolute;top:100%;left:50%;transform:translateX(-50%);
    margin-top:-2px;white-space:nowrap;font-size:11.5px;font-style:normal;line-height:1.4;
    background:var(--ink);color:var(--panel);padding:4px 7px;border-radius:5px;
    box-shadow:var(--shadow);z-index:5;pointer-events:none;font-variant-numeric:tabular-nums}
  /* first/last cells would overflow the panel if centred */
  .strip i:first-child[data-tip]:hover::after{left:0;transform:none}
  .strip i:last-child[data-tip]:hover::after{left:auto;right:0;transform:none}
  .rr-pct{font-variant-numeric:tabular-nums}
  .rr-pct.short{color:var(--warn)}
  .base-tiles{display:flex;flex-wrap:wrap;gap:8px}
  .more-btn{margin-top:12px;font-size:12.5px;color:var(--accent);background:none;border:0;cursor:pointer;padding:0;font-weight:600}
  .balanced{background:var(--accent-soft);border:1px solid var(--accent);border-radius:10px;padding:14px;font-size:14px}
  /* recipe cards */
  .recipe{border:1px solid var(--line);border-radius:10px;padding:11px 12px;margin-bottom:10px}
  .recipe .rhead{display:flex;justify-content:space-between;gap:8px;align-items:baseline}
  .recipe .rhead b{font-size:14px}
  .recipe .fit{font-size:11px;color:var(--muted);white-space:nowrap}
  .recipe .rmethod{font-size:12.5px;color:var(--muted);margin:4px 0 8px}
  .recipe .ruses,.recipe .radd,.recipe .rfinish{font-size:12.5px;margin-top:3px}
  .recipe .radd{color:var(--warn)}
  .recipe .rfinish{color:var(--accent)}
  .radd-link{cursor:pointer;text-decoration:underline;text-underline-offset:2px;white-space:nowrap}
  .radd-link:hover{opacity:.65}
  .rlbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div>
      <h1>Balanced Meal Planner</h1>
      <p class="sub">Pantry-driven · protein-gated · build a plate and watch the nutrient gaps fill</p>
    </div>
    <a class="reset" href="menu.html" style="margin-left:auto;text-decoration:none">🗓️ Menu</a>
    <a class="reset" href="shop.html" style="margin-left:0;text-decoration:none">🧺 Shopping list</a>
    <button class="reset" id="reset" style="margin-left:0">Reset plate</button>
  </div>

  <!-- meal picker -->
  <div class="panel">
    <h2>1 · Which meal?</h2>
    <div class="tabs" id="meals"></div>
    <div id="dayBar" style="margin-top:12px;display:flex;align-items:center;flex-wrap:wrap;gap:6px"></div>
  </div>

  <!-- prep queue — soak/sprout/bhuna ahead-work; done → becomes ready stock -->
  <div class="panel">
    <h2>🌱 Prep pending</h2>
    <div id="prep"></div>
  </div>

  <div class="cols">
    <!-- LEFT: suggestion loop -->
    <div class="col">
      <div class="panel">
        <h2>2 · Build the plate</h2>
        <input class="search" id="search" placeholder="🔍 Search a dish or an ingredient — shakshuka, tofu, greek, ragi…" autocomplete="off">
        <div id="builder"></div>
        <div class="flags" id="flags"></div>
      </div>
      <div class="panel">
        <h2>🍳 Recipes from your plate</h2>
        <div id="recipes"></div>
      </div>
      <div class="panel p-saved">
        <h2>Saved plates</h2>
        <div id="saved"></div>
      </div>
    </div>

    <!-- RIGHT: plate + rollup -->
    <div class="col">
      <!-- On mobile this same panel becomes a bottom sheet: the grip stays peeking above the fold
           so the plate is reachable from anywhere in the scroll, and the body scrolls inside it.
           One panel, two presentations — no duplicate #plate to keep in sync. -->
      <div class="panel" id="platePanel">
        <div class="sheet-grip" id="sheetGrip">
          <div class="grip-bar"></div>
          <h2 style="margin:0">Your plate</h2>
          <div class="sheet-sum" id="sheetSum"></div>
        </div>
        <div class="sheet-body">
          <div id="plate"></div>
          <button class="next-btn" id="savePlate" style="margin-top:14px">＋ Save plate to this day</button>
          <div id="recipeSave"></div>
        </div>
      </div>
      <!-- One bar list, three horizons. Same nutrients, same scale, same row positions — the
           comparison only works if the bars stay put while the window changes under them. -->
      <div class="panel totals">
        <h2 id="horizonTitle"></h2>
        <div class="seg" id="horizonSeg"></div>
        <div id="totals" class="hz" data-pane="plate"></div>
        <div id="dayTotals" class="hz" data-pane="day"></div>
        <div id="runRate" class="hz" data-pane="week"></div>
      </div>
      <div class="panel p-tail">
        <h2>Cadence reminders</h2>
        <div class="reminders" id="reminders"></div>
      </div>
    </div>
  </div>
</div>

<script>
/* ============ DATA — loaded from ingredients.csv + targets.csv ============ */
// Populated by buildData() after fetch. Edit the CSVs (not this file) to change data.
let ING = [], FOCUS = {}, DAILY = {}, BASES = [], SEQ_MAIN = [], RECIPES = [], MENU = [], STOCK = {};
const SEQ_SNACK = ['protein','vitc'];
const CAD_LABEL = {meal:'Per meal', day:'Daily', week:'Weekly (average)'};
const KCAL = 1775; // deficit midpoint
/* Per-slot protein, summing to the 100 g daily target across all four slots — but weighted so
   the snack carries the least. Snacks happen here, just not reliably; skipping one should cost
   8 g, not 25 g. The old split (30/32/20/28) leaned on the snack for a fifth of the day. */
const MEALS = {
  breakfast:{label:'Breakfast', p:30, micros:true},
  lunch:{label:'Lunch', p:32, micros:true},
  snack:{label:'Snack', p:8,  micros:false},   // deliberately light — the skippable slot
  dinner:{label:'Dinner', p:30, micros:true},
};
/* Calorie budget per slot, DERIVED from the protein allocation above rather than typed in.
   Protein is the anchor (§1): the slot asked for a third of the day's protein is the slot that
   has to carry about a third of its calories, or the gate is unmeetable inside the budget.
   Deriving it also keeps one number authoritative — retune a meal's protein and its calorie
   line follows instead of quietly disagreeing with it. Rounding can leave the four ±1 kcal off
   KCAL; that is below the resolution of anything reading it. */
(() => { const ms = Object.values(MEALS), tp = ms.reduce((s,m)=>s+m.p, 0);
         ms.forEach(m=> m.kcal = Math.round(KCAL * m.p / tp)); })();
// coaching line per nutrient (presentation only — not in CSV)
const BLURBS = {
  protein:'The per-meal gate. Hit this first — is there 25-30 g in front of me?',
  carbs:'The base/grain. Rice, millet, ragi, poha, dosa. Moderate for the deficit.',
  iron:'High-risk on a plant diet. Pair with a sour (lemon/tomato) to double uptake.',
  calcium:'High-risk low-dairy. Ragi, til, curd, moringa, tofu carry it (+ Cipcal).',
  fibre:'Ramp slowly + scale water. Legumes, millets, guava, veg.',
  vitc:'Low-risk itself, but it is the iron-absorption partner — put it on the iron meal.',
  folate:'Rides along with legumes + greens — usually free if protein is done well.',
  omega3:'Plant ALA — 1 tbsp ground flax hits the 1.6 g target, but <10% converts to usable EPA/DHA. Covers the ALA line, not the DHA one.',
  omega3dha:'Pre-formed DHA/EPA — the form the body actually uses. Flax does NOT fill this. Egg yolk / omega-3 eggs, or an algae cap on veg days.',
  zinc:'Bank it across the week — pumpkin seeds, sprouted dals, til, millets.',
  vita:'Fat-soluble, stores — average across the week via carrot / greens / papaya.',
  magnesium:'Millets carry it, rice does not — the base you pick decides this one.',
  potassium:'Banana, greens, beetroot, coconut water. Low-risk if the veg layer is real.',
};
const NONFOOD = [
  {nm:'B12', cad:'day', how:'supplement — no plant source'},
  {nm:'Vitamin D3', cad:'month', how:'supplement + 15 min sun; dose by blood test'},
  {nm:'Calcium (Cipcal)', cad:'day', how:'supplement — tops up food calcium'},
  {nm:'Iodine', cad:'day', how:'iodised salt (trivially met)'},
  {nm:'Probiotic', cad:'day', how:'curd / buttermilk / idli — a live-culture serving'},
];

/* ---- API JSON → data structures (source of truth is meals.db, served by app.py) ---- */
function buildData(d){
  ING = (d.ingredients||[]).map(r=>({
    id:r.id, nm:r.name, unit:r.unit, def:+r.default||1, pack:+r.pack||1, role:r.role||'',
    pantry:!!r.pantry, base:!!r.base, green:!!r.green, probiotic:!!r.probiotic,
    note:r.note||'', shelf:+r.shelf||30, lead:+r.lead||0, prep:r.prep||'',
    makes:r.makes||'', keep:!!r.keep, grams:+r.grams||0, ifct_code:r.ifct_code||'',
    n:{ kcal:+r.kcal||0, p:+r.protein||0, c:+r.carbs||0, fib:+r.fibre||0, fe:+r.iron||0, ca:+r.calcium||0,
        vc:+r.vitc||0, fo:+r.folate||0, o3:+r.omega3||0, o3d:+r.omega3_dha||0, zn:+r.zinc||0, va:+r.vita||0,
        mg:+r.magnesium||0, k:+r.potassium||0 },
    needform:r.needform||'', gated:(r.gated||[]).map(x=>NKEY[x]||x) }));
  BASES = ING.filter(i=>i.base).map(i=>i.id);
  FOCUS = {}; DAILY = {}; SEQ_MAIN = [];
  (d.targets||[]).forEach(r=>{
    FOCUS[r.fname] = {key:r.key, nm:r.name, unit:r.unit, cad:r.cadence, daily:+r.daily||0, meal:+r.meal||0, permeal:!!r.permeal, blurb:BLURBS[r.fname]||''};
    DAILY[r.key] = +r.daily||0; SEQ_MAIN.push(r.fname);
  });
  RECIPES = (d.recipes||[]).map(r=>({ id:r.id, name:r.name, meals:r.meals||[], core:r.core||[], opt:r.opt||[],
    method:r.method||'', cuisine:r.cuisine||'', effort:+r.effort||0, user:!!r.user }));
}

/* ---- API helpers ---- */
// relative base → works served from a domain root (/) or a subpath (/meals/) unchanged
const API = new URL('api/', location.href.replace(/[^/]*$/, '')).href;
async function api(path, body){
  const opt = body===undefined ? {} :
    {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)};
  const res = await fetch(API+path, opt);
  if(!res.ok) throw new Error(`${path} → ${res.status}`);
  return res.json();
}
// a write failed — tell the user rather than silently dropping their data
function apiFail(what, e){
  console.error(what, e);
  const b=document.createElement('div');
  b.style.cssText='position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:var(--warn);color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;z-index:99;box-shadow:var(--shadow)';
  b.textContent=`⚠ Couldn't ${what} — not saved. ${e.message||''}`;
  document.body.appendChild(b); setTimeout(()=>b.remove(), 5000);
}

/* ============ STATE ============ */
// Saved plates + user recipes live in meals.db (via /api). The browser holds no durable state.
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function yesterdayStr(){ const d=new Date(); d.setDate(d.getDate()-1); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }

let state = { meal:'lunch', focus:'protein', plate:[] /* {id, qty} */, showBuy:false, query:'', expand:false,
  savingRecipe:false, saved:[] /* [{id,date,meal,items:[{id,qty}]}] — from GET /api/plates */, day:todayStr(),
  olderDays:0 /* extra day-groups revealed past the today+yesterday window */,
  /* How far back history is fetched. 30 days comfortably covers the two windows that actually read
     it — RUN_DAYS=7 and recentUse's 3 — with slack for selecting a past date in the day bar.
     Widened, never narrowed, by loadMore(): shrinking it mid-session would drop plates the run
     rate is already averaging over. */
  since: shiftDay(todayStr(), -30), loadingMore:false, exhausted:false,
  horizon:'day' /* plate | day | week — which window the shared bar list is showing. See syncHorizon() */ };

function targetFor(focusName){
  if(focusName==='protein') return MEALS[state.meal].p;
  return FOCUS[focusName] ? FOCUS[focusName].meal : 0;
}
function seq(){ return SEQ_MAIN; }  // full nutrient universe (CSV order) — same for every meal
// required gate: main meals = the permeal nutrients; a snack only gates protein (rest is day-level optional)
function seqReq(){ const per=SEQ_MAIN.filter(fn=>FOCUS[fn] && FOCUS[fn].permeal);
  return MEALS[state.meal].micros ? per : per.filter(fn=>fn==='protein'); }
// optional this meal = everything not currently required — daily/weekly items still show + track across the day
function seqOpt(){ const req=new Set(seqReq()); return SEQ_MAIN.filter(fn=>FOCUS[fn] && !req.has(fn)); }
// a target counts as "met" within 10% — a small gap shouldn't block the flow
const MET_TOL = 0.90;
function underTarget(fn){ return plateTotal(FOCUS[fn].key) < targetFor(fn)*MET_TOL; }
// which nutrient the builder is actively filling (null = all required met). optional foci allowed only if user taps one.
function activeFocus(){
  const req = seqReq().filter(underTarget);
  if(seqOpt().includes(state.focus)) return state.focus;
  if(req.includes(state.focus)) return state.focus;
  return req[0] || null;
}

/* ---- freshness: what's about to turn, so the planner steers you at it ---- */
const stockQty = id => (STOCK[id]||{}).qty || 0;
function daysLeft(id){
  const i = ING.find(x=>x.id===id), b = (STOCK[id]||{}).bought;
  if(!i || !b) return 99;
  const age = Math.floor((new Date(todayStr()+'T00:00') - new Date(b.slice(0,10)+'T00:00'))/86400000);
  return (i.shelf||30) - age;
}
const isDying = id => stockQty(id) > 0 && daysLeft(id) <= 3;
// `pantry` is a static seed hint from the CSV — it says "I usually keep this", not "I have this".
// Once any stock has actually been counted, the count is the truth and the hint is ignored.
// Before that first count everything reads 0, so fall back to the hint rather than badging all 121.
const stockSeeded = () => Object.values(STOCK).some(x=>(x.qty||0) > 0);
const needsBuy = i => stockSeeded() ? stockQty(i.id) <= 0 : !i.pantry;
const haveNow  = i => !!i && !needsBuy(i);

/* Graded decay pressure, 0..1. isDying is a cliff — a beetroot with 4 days left scores the same
   as one with 30, then jumps to full panic on day 3. That reads nothing like how produce actually
   sits in a fridge, so the ranking only noticed a perishable once it was nearly too late.
   Ramps from a week out, and an already-overdue item pins at 1 rather than going negative. */
function urgency(id){
  if(stockQty(id) <= 0) return 0;
  const d = daysLeft(id);
  if(d >= 7) return 0;
  return Math.min(1, (7 - Math.max(d, 0)) / 7);
}

/* ============ HELPERS ============ */
const $ = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];

/* ---- delivered(): the ONE seam between "what the table says" and "what you get" ----

   Every nutrient read in this file goes through here — plateTotal, the run rate, the debt map,
   the ranking, the scorecard. That is deliberate: absorption is not a feature to bolt onto one
   screen, it is a correction to a single number that the whole planner already reads.

   Today it applies GATES only (ingredients.csv needform/gated). A gate is a flag, not a
   multiplier: whole til is listed at 88 mg calcium, but an intact seed coat passes through you,
   so its calcium is not 88 and it is not 40 either — we do not have the number. Crediting 88 is
   a lie the planner then acts on; crediting 0 until it is ground is the honest floor and it is
   also the behaviour we want, because it stops repair() "fixing" a calcium debt with a spoonful
   of seeds. See forms.csv mechanism=matrix for why there is no percentage to use instead.

   Retention (retention.csv) and phytate absorption (phytate.csv x forms.csv) multiply in HERE
   when they get wired — nothing downstream has to change. Note they must NOT be applied to the
   debt/target comparison as-is: targets.csv figures are CONSUMED intakes with bioavailability
   already divided out, so absorbed values belong in ranking tiebreaks, not in gap arithmetic. */
// nutrient long names (CSV/DB) -> the short keys used in i.n and FOCUS[].key.
// gated lists are authored long-form in ingredients.csv because that is readable; they must be
// translated here or every gate silently no-ops against a key that does not exist.
const NKEY = {kcal:'kcal', protein:'p', carbs:'c', fibre:'fib', iron:'fe', calcium:'ca', vitc:'vc',
  folate:'fo', omega3:'o3', omega3_dha:'o3d', zinc:'zn', vita:'va', magnesium:'mg', potassium:'k'};
function gatedOut(i,key){ return !!(i.needform && (i.gated||[]).includes(key)); }
function delivered(i,key){ return gatedOut(i,key) ? 0 : (i.n[key]||0); }

/* A dish with NO meal slot is eligible for ANY slot. 179 dishes came from INDB, which has no
   course field; 86 got a slot from a second source and 93 did not. Treating blank as
   "unknown, so allow it" keeps them in play, and — importantly — keeps the DATA honest:
   we never write a slot we did not source, so `meals` still means "someone established this".
   The alternative (filling blanks with all four in the CSV) would look like provenance. */
const fitsMeal = (r, m) => !r.meals.length || r.meals.includes(m);

function itemsTotal(items,key){ return items.reduce((s,it)=>{
  const ing = ING.find(i=>i.id===it.id); return s + (ing ? delivered(ing,key) : 0)*it.qty; },0); }
function plateTotal(key){ return itemsTotal(state.plate,key); }
function inPlate(id){ return state.plate.find(p=>p.id===id); }
function plateHas(prop){ return state.plate.some(it=>{ const i=ING.find(x=>x.id===it.id); return i && i[prop]; }); }
// the nutrient we're currently filling (for showing the right contribution in search + suggestions)
function activeGap(){
  const fn = state.plate.length ? activeFocus() : null;
  if(fn) return {fname:fn, key:FOCUS[fn].key, remaining:Math.max(0, targetFor(fn)-plateTotal(FOCUS[fn].key))};
  return {fname:'protein', key:'p', remaining:0};
}
// aggregation across saved plates
function platesFor(date){ return state.saved.filter(p=>p.date===date); }
function aggTotal(plates,key){ return plates.reduce((s,p)=>s+itemsTotal(p.items,key),0); }
function shiftDay(s,n){ const d=new Date(s+'T00:00'); d.setDate(d.getDate()+n);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
// how many of the last `days` days' plates included this ingredient — drives the anti-monotony nudge
function recentUse(id, days=3){ const cut=shiftDay(state.day,-days);
  return state.saved.filter(p=>p.date>cut && p.date<=state.day)
                    .reduce((n,p)=> n + (p.items.some(it=>it.id===id)?1:0), 0); }
function daysLogged(plates){ return new Set(plates.map(p=>p.date)).size; }

/* ---- run rate: the trailing record, so a CHRONIC shortfall is visible and can steer today ----
   Two deliberate choices, both about not manufacturing a deficit out of nothing:

   1. The window ends YESTERDAY. Today is half-eaten by definition — folding a day still in
      progress into the average would read as a shortfall every morning and push phantom debt
      into the suggestions. Today has its own panel; this one is the closed record.
   2. The denominator is days LOGGED, not 7. A day you forgot to track is missing evidence,
      not a zero — dividing by 7 would let a lazy week look like malnutrition. The panel prints
      n/7 so a thin record is visible rather than hidden inside the number. */
const RUN_DAYS = 7;
const DEBT_TOL = 0.85;            // trailing average below 85% of the daily target = carrying debt
// …but an average over one or two days is an anecdote, not a run rate. Below this the panel still
// SHOWS what it has (it's information), it just doesn't get to steer the builder or the menu —
// one carb-light Tuesday should not rewrite next week.
const DEBT_MIN_DAYS = 3;
function runWindow(){
  const start=shiftDay(state.day,-RUN_DAYS), end=shiftDay(state.day,-1);
  return state.saved.filter(p=>p.date>=start && p.date<=end);
}
function runRate(key){
  const plates=runWindow(), n=daysLogged(plates);
  return {avg: n ? aggTotal(plates,key)/n : 0, days:n};
}
// per-day totals for the strip, oldest first. v null = nothing logged that day — a blank, not a
// zero, so a gap in the record never renders as a red day you didn't actually eat badly.
// Carries the date too: a cell you can't name is a cell you can't act on.
function runSeries(key){
  return Array.from({length:RUN_DAYS}, (_,i)=>{
    const d  = shiftDay(state.day, -(RUN_DAYS-i));
    const ps = platesFor(d);
    return {d, v: ps.length ? aggTotal(ps,key) : null};
  });
}
// "Tue 14 Jul" — enough to place the day without the year, which is always this one.
function dayLabel(s){
  return new Date(s+'T00:00').toLocaleDateString(undefined,{weekday:'short',day:'numeric',month:'short'});
}
/* How far below target the trailing average sits: 0 = on track, 1 = nothing at all.
   Starts accruing only past DEBT_TOL, so hitting 90% of iron every day is not "debt".
   Too little history = no debt: silence is not evidence of a gap. */
let _debt=null;                   // rebuilt once per render; read per-ingredient in the ranking
function debtMap(){
  if(_debt) return _debt;
  _debt={};
  SEQ_MAIN.forEach(fn=>{
    const f=FOCUS[fn], {avg,days}=runRate(f.key);
    _debt[fn] = (days < DEBT_MIN_DAYS || !f.daily) ? 0 : Math.max(0, 1 - avg/(f.daily*DEBT_TOL));
  });
  return _debt;
}
const inDebt = fn => debtMap()[fn] > 0;
/* An ingredient's pull toward what the week has been missing — what turns "consistently low on
   iron" into spinach ranking above an equally-good-fit alternative.

   A debt-WEIGHTED AVERAGE over the nutrients in debt (share of a day's target that one serving
   carries), NOT a sum clipped at 1: a clipped sum saturates the moment several nutrients are owed
   at once, which is precisely when it needs to tell foods apart. Normalising keeps it 0-1 and
   discriminating however many nutrients are owed. */
function debtBonus(i){
  const m=debtMap();
  let num=0, den=0;
  SEQ_MAIN.forEach(fn=>{ const f=FOCUS[fn], w=m[fn]||0;
    if(!f.daily || w<=0) return;
    num += w*Math.min(delivered(i,f.key)*i.def/f.daily, 1); den += w; });
  return den ? num/den : 0;
}
// today's total INCLUDING the current unsaved plate — used to judge optional (daily/weekly) items
function dayGot(key){ return aggTotal(platesFor(state.day), key) + plateTotal(key); }
function dayHas(prop){ return platesFor(state.day).some(p=>p.items.some(it=>{const i=ING.find(x=>x.id===it.id); return i && i[prop];})) || plateHas(prop); }
// optional "done" = today's contribution hits the daily target (for weekly nutrients that's the 1/7 day-share)
function optMet(fn){ const f=FOCUS[fn]; return dayGot(f.key) >= f.daily*MET_TOL; }
function barRow(nm,got,tgt,unit,over){ const pct=Math.min(100, tgt?got/tgt*100:0);
  return `<div class="prog-lbl"><span>${nm} <span style="color:var(--muted)">/ ${tgt}${unit}</span></span><b>${round1(got)}${unit}</b></div>
    <div class="bar"><i class="${over&&got>tgt?'over':''}" style="width:${pct}%"></i></div>`; }
// plate ops — every mutation goes to the DB, then state mirrors what the server accepted
async function savePlate(){
  if(!state.plate.length) return;
  const p = { date:state.day, meal:state.meal, items:state.plate.map(x=>({...x})) };
  try{
    const {id} = await api('plates', p);
    state.saved.push({...p, id});
    state.plate=[]; state.focus='protein'; render(); setSheet(false);
  }catch(e){ apiFail('save this plate', e); }
}
function editPlate(id){ const p=state.saved.find(x=>x.id===id); if(!p) return;
  // pull it back onto the builder; it's removed from the DB and re-saved on the next Save
  state.meal=p.meal; state.day=p.date; state.plate=p.items.map(x=>({...x})); state.focus='protein';
  delPlate(id); window.scrollTo(0,0); render(); setSheet(true); }
async function delPlate(id){
  const prev=state.saved;
  state.saved=state.saved.filter(x=>x.id!==id); render();
  try{ await api('plates/delete', {id}); }
  catch(e){ state.saved=prev; apiFail('delete that plate', e); render(); }
}
// roles that season/finish a dish rather than define it — these go to `opt` so a missing
// clove of garlic doesn't stop the dish matching. Mirrors how recipes.csv splits its rows.
const OPT_ROLES = ['seed','sour','fruit','condiment','aromatic'];
// save the current plate as a reusable recipe: core = substantial items, opt = seasoning/finish
async function saveAsRecipe(name){
  if(!state.plate.length) return;
  const ids=state.plate.map(p=>p.id);
  const isOpt=id=>{const i=ING.find(x=>x.id===id); return i && OPT_ROLES.includes(i.role);};
  const r={ name:(name||'').trim()||('My '+MEALS[state.meal].label.toLowerCase()),
    meals:[state.meal], core:ids.filter(id=>!isOpt(id)), opt:ids.filter(isOpt), method:'Your saved recipe' };
  try{
    const {id} = await api('recipes', r);
    RECIPES.push({...r, id, user:true, cuisine:'', effort:0});   // unknown for a hand-saved recipe
    state.savingRecipe=false; render();
  }catch(e){ apiFail('save this recipe', e); }
}
async function delRecipe(id){
  const prev=RECIPES;
  RECIPES=RECIPES.filter(r=>r.id!==id); render();
  try{ await api('recipes/delete', {id}); }
  catch(e){ RECIPES=prev; apiFail('delete that recipe', e); render(); }
}

/* ============ RENDER ============ */
/* Which horizon you land on, decided by whether you're holding anything. An EMPTY plate scored
   against full targets is all zeros — that reads as failure when it's really a blank slate, and
   it answers a question nobody asked. Before you've put anything down the live question is what
   the DAY still owes you, so that's the default. The moment the plate stops being empty it
   flips: you're building something now, and the plate is the thing you're building. Emptying it
   (saving, resetting) hands it back to Today, where the plate you just saved has landed.
   Only the TRANSITION switches, never the steady state — so if you tab to Week mid-plate it
   stays on Week, and this can't fight you while you add the next six items. */
let plateWas = 0;
function syncHorizon(){
  const n = state.plate.length;
  if(n && !plateWas)      state.horizon = 'plate';
  else if(!n && plateWas) state.horizon = 'day';
  plateWas = n;
}
function render(){ _debt=null;   // the record may have moved (a plate saved, the day switched) — recompute once, here
  syncHorizon();
  renderMeals(); renderDayBar(); renderPrep(); renderBuilder(); renderRecipes(); renderPlate(); renderRecipeSave(); renderTotals();
  renderDayTotals(); renderRunRate(); renderHorizon(); renderFlags(); renderReminders(); renderSaved();
  renderSheet(); }

/* The grip line — what you need to know about the plate without opening it. */
function renderSheet(){
  const el = $('#sheetSum'); if(!el) return;
  const n = state.plate.length;
  el.innerHTML = n
    ? `${n} item${n===1?'':'s'} · <b style="color:var(--ink)">${round1(plateTotal('p'))}g</b> / ${MEALS[state.meal].p}g protein · ${Math.round(plateTotal('kcal'))} kcal`
    : `Empty — tap a suggestion to start`;
  syncPeek();
}

/* The collapsed height is the grip's actual height, measured. Hard-coding it means the sheet
   mis-parks the day the summary wraps to two lines or the font metrics shift. */
function syncPeek(){
  const p=$('#platePanel'), g=$('#sheetGrip'); if(!p||!g) return;
  p.style.setProperty('--peek', Math.round(g.getBoundingClientRect().height) + 'px');
}
function setSheet(open){ $('#platePanel')?.classList.toggle('open', open); }

/* Tap the grip to toggle; drag it to place. Drag is worth the ~20 lines here — a sheet that only
   responds to taps reads as broken on a phone, because the grip looks draggable. Vertical intent
   only, and a short flick counts the same as a long drag. */
function initSheet(){
  const p=$('#platePanel'), g=$('#sheetGrip'); if(!p||!g) return;
  let y0=null, t0=0, dy=0, moved=false;
  const mobile=()=>matchMedia('(max-width:820px)').matches;
  g.addEventListener('pointerdown', e=>{
    if(!mobile()) return;
    y0=e.clientY; t0=Date.now(); dy=0; moved=false;
    p.classList.add('dragging'); g.setPointerCapture(e.pointerId);
  });
  g.addEventListener('pointermove', e=>{
    if(y0===null) return;
    dy=e.clientY-y0;
    if(Math.abs(dy)>4) moved=true;
    // drag adjusts the same clamped height the open/closed states use, so a released drag lands
    // on exactly what the CSS would have animated to — no transform to unwind
    const peek=parseFloat(getComputedStyle(p).getPropertyValue('--peek'))||70;
    const max=innerHeight*0.78;
    const rest=p.classList.contains('open')?max:peek;
    p.style.maxHeight=Math.max(peek, Math.min(max, rest-dy))+'px';
  });
  const end=e=>{
    if(y0===null) return;
    p.classList.remove('dragging'); p.style.maxHeight='';
    const quick=Date.now()-t0 < 300 && Math.abs(dy)>24;
    if(!moved) setSheet(!p.classList.contains('open'));           // a tap
    else if(quick) setSheet(dy<0);                                 // a flick
    else setSheet(Math.abs(dy) < p.offsetHeight/3 ? p.classList.contains('open') : dy<0);
    y0=null;
  };
  g.addEventListener('pointerup', end);
  g.addEventListener('pointercancel', end);
  addEventListener('resize', syncPeek);
  syncPeek();
}

const HORIZONS = {
  plate: {tab:'This plate', h2:'This plate <span style="text-transform:none;font-weight:400">· vs full targets</span>'},
  day:   {tab:'Today',      h2:'Day totals <span style="text-transform:none;font-weight:400">· saved plates</span>'},
  week:  {tab:'Week',       h2:'Run rate <span style="text-transform:none;font-weight:400">· last 7 completed days · worst first</span>'}
};
/* Swaps which pane is in flow. All three are already rendered by render() — this only decides what
   you look at, so the switch costs nothing and never loses your place. */
function renderHorizon(){
  $('#horizonTitle').innerHTML = HORIZONS[state.horizon].h2;
  $('#horizonSeg').innerHTML = Object.entries(HORIZONS).map(([k,v])=>
    `<button data-hz="${k}" class="${state.horizon===k?'on':''}">${v.tab}</button>`).join('');
  $$('.hz').forEach(el=> el.classList.toggle('on', el.dataset.pane===state.horizon));
}

function renderRecipeSave(){
  const el=$('#recipeSave'); if(!el) return;
  if(!state.plate.length){ el.innerHTML=''; return; }
  if(state.savingRecipe){
    const guess=state.plate.map(p=>ING.find(i=>i.id===p.id)).filter(Boolean)
      .filter(i=>['protein','base','veg','green'].includes(i.role)).slice(0,2).map(i=>i.nm).join(' ') || 'My dish';
    el.innerHTML=`<div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">
        <input id="recipeName" class="search" style="margin:0;flex:1;min-width:110px" placeholder="Recipe name" value="${guess}">
        <button class="add" id="recipeConfirm">Save recipe</button>
        <button class="add rm" id="recipeCancel">✕</button>
      </div>
      <div style="font-size:11.5px;color:var(--muted);margin-top:6px">Saves this combo to the recipe database so it's a permanent suggestion.</div>`;
  } else {
    el.innerHTML=`<button class="more-btn" id="recipeAdd" style="margin-top:10px">＋ also save as a recipe</button>`;
  }
}

// how a peripheral ingredient attaches to a dish (used to phrase "finish: flax (sprinkle)")
const ROLE_VERB = {seed:'sprinkle', sour:'squeeze in', condiment:'serve with', fruit:'on the side', green:'stir in'};
// greedily decompose a set of ingredient ids into ready dishes + accompaniments (shared by recipes panel & saved-plate headers)
function composePlate(ids, meal){
  const onP=id=>ids.includes(id);
  const ing=id=>ING.find(x=>x.id===id);
  const isBaseId=id=>{const i=ing(id); return i&&i.role==='base';};
  const fits=r=>fitsMeal(r,meal)?1:0;
  const ready=RECIPES.filter(r=>r.core.length && r.core.every(onP))
    .map(r=>({r, nb:r.core.filter(id=>!isBaseId(id))}))
    .filter(x=>x.nb.length>0)
    .sort((a,b)=>(b.nb.length-a.nb.length)||(fits(b.r)-fits(a.r)));
  const covered=new Set(), chosen=[];
  ready.forEach(x=>{ if(x.nb.some(id=>!covered.has(id))){ chosen.push(x.r);
    x.r.core.forEach(id=>covered.add(id)); x.r.opt.forEach(id=>{ if(onP(id)) covered.add(id); }); }});
  const bases=ids.filter(isBaseId); bases.forEach(id=>covered.add(id));
  const finish=ids.filter(id=>!covered.has(id)).map(ing).filter(i=>i&&ROLE_VERB[i.role]);
  finish.forEach(i=>covered.add(i.id));
  const leftover=ids.filter(id=>!covered.has(id)).map(ing).filter(Boolean);
  return {chosen, bases, finish, leftover};
}

/* ============ PREP QUEUE — the ahead-work `effort` misses ============
   Some things can't be cooked on demand: rajma needs an 8h soak, moong a 24h sprout, and a gravy
   wants a bhuna base made once and kept. Those are PREP OUTPUTS (ingredients with a `makes` link).
   This queue is fed from two sides:
     · menu-driven — an upcoming planned dish needs a soak/sprout that isn't ready yet
     · standing (keep=1) — a batch you always want on hand (base paste, a sprout jar) has run out
   Marking one Done bumps that output's stock (POST /api/stock/add); shelf life then expires it. */
const MEAL_HOUR = {breakfast:8, lunch:13, snack:17, dinner:20};
const prepOutputs = () => ING.filter(i=>i.makes);
const outputForRaw = raw => prepOutputs().find(o=>o.makes.split(/\s+/).includes(raw));
function prepWhen(hrs){
  if(hrs < 0)  return {t:'overdue — start now', urgent:true};
  if(hrs < 3)  return {t:'start now',           urgent:true};
  if(hrs < 14) return {t:'start tonight',       urgent:false};
  return {t:'start tomorrow', urgent:false};
}
function prepPending(){
  const now = new Date();
  const rows = [], ready = {};
  const slots = MENU.filter(s=>s.date>=state.day).sort((a,b)=>
    (a.date+String(MEAL_HOUR[a.meal]||12).padStart(2,'0')).localeCompare(b.date+String(MEAL_HOUR[b.meal]||12).padStart(2,'0')));
  slots.forEach(sl=>{
    const cookAt = new Date(`${sl.date}T${String(MEAL_HOUR[sl.meal]||12).padStart(2,'0')}:00`);
    sl.items.forEach(it=>{
      const i = ING.find(x=>x.id===it.id); if(!i) return;
      const o = i.makes ? i : outputForRaw(i.id);   // the prepped form this item needs
      const lead = o ? o.lead : i.lead;             // no output row (e.g. millet) → nag off the raw
      if(!lead) return;
      if(o){                                        // a ready batch of the output cancels the prep
        const have = ready[o.id] ?? stockQty(o.id);
        if(have >= it.qty){ ready[o.id] = have - it.qty; return; }
        ready[o.id] = Math.max(0, (o.pack||4) - it.qty);
      }
      const startBy = new Date(cookAt.getTime() - lead*3600e3);
      const hrs = (startBy - now)/3600e3;
      if(hrs > 40) return;                          // too far out to act on yet
      const r = RECIPES.find(x=>x.id===sl.recipe);
      rows.push({o, raw:i, lead, startBy, hrs, dish:r?r.name:MEALS[sl.meal].label});
    });
  });
  const byKey = {};                                 // one row per output/raw — earliest deadline binds
  rows.sort((a,b)=>a.startBy-b.startBy).forEach(x=>{ const k=x.o?x.o.id:x.raw.id; if(!byKey[k]) byKey[k]=x; });
  const list = Object.values(byKey);
  const queued = new Set(list.map(x=>x.o&&x.o.id));
  prepOutputs().filter(o=>o.keep && stockQty(o.id)<=0 && !queued.has(o.id))  // standing preps that ran out
    .forEach(o=>list.push({o, standing:true, lead:o.lead}));
  return list.sort((a,b)=>(a.startBy?0:1)-(b.startBy?0:1) || (a.startBy - b.startBy));
}
function renderPrep(){
  const el=$('#prep'); if(!el) return;
  const list = prepPending();
  if(!list.length){ el.innerHTML = `<div class="empty">✓ Nothing to prep — everything you'll need is ready.</div>`; return; }
  el.innerHTML = list.map(x=>{
    const o = x.o, title = (o||x.raw).nm, doing = ((o||x.raw).prep)||'';
    const w = x.standing ? {t:'keep a batch ready', urgent:false} : prepWhen(x.hrs);
    const meta = x.standing ? 'always keep on hand'
      : `${w.t} · by ${x.startBy.toLocaleString(undefined,{weekday:'short',hour:'numeric',minute:'2-digit'})}${x.lead?` — needs ${x.lead}h`:''}`;
    const forr = x.standing ? '' : ` · for ${x.dish}`;
    const btn = o ? `<button class="add" data-prepdone="${o.id}" style="padding:6px 10px">✓ Done</button>` : '';
    return `<div class="plate-item">
      <div class="pn"><b>${title}</b>
        <small style="color:${w.urgent?'var(--warn)':'var(--muted)'}">${meta}${forr}</small>
        ${doing?`<small style="color:var(--muted)">${doing}</small>`:''}</div>
      ${btn}</div>`;
  }).join('');
}
// Prep done → the output becomes ready stock (its shelf-life clock starts now). Reuses /api/stock/add.
async function prepDone(oid){
  const o = ING.find(i=>i.id===oid); if(!o) return;
  try{ STOCK = await api('stock/add', {id:oid, delta:(o.pack||1)}); render(); }
  catch(e){ apiFail('log the prep', e); }
}

// The menu page plans; the planner cooks. This is the bridge — load the planned slot, tweak it,
// save it. Saving marks it eaten and consumes stock, exactly like any other plate.
/* The plan for this day, folded into the builder. It used to be its own panel above the
   suggestions, which put a plan you might follow and a suggestion you might take in two places
   competing for the same decision — and on a phone, half a screen apart. Same decision, one
   place: what's planned leads, what's suggested follows.
   Returns '' when there's no plan, so the builder simply opens on suggestions. */
function plannedSection(){
  const today = MENU.filter(s=>s.date===state.day);
  if(!today.length) return '';
  const mine = today.filter(s=>s.meal===state.meal);
  const prep = []; // anything on today's plan that needed starting yesterday
  today.forEach(sl=> sl.items.forEach(it=>{ const i=ING.find(x=>x.id===it.id);
    if(!i || !i.lead || prep.some(x=>x.id===i.id)) return;
    // only nag for prep we actually owe. A dry staple (rajma, shelf 365) needs its soak every
    // time; an already-prepped perishable (a sprout jar, shelf 3) doesn't while stock covers it.
    const alreadyDone = (i.shelf||30) <= 3 && stockQty(i.id) >= it.qty;
    if(!alreadyDone) prep.push(i); }));

  const rows = mine.map(sl=>{
    const r = RECIPES.find(x=>x.id===sl.recipe);
    const p = itemsTotal(sl.items,'p'), kc = itemsTotal(sl.items,'kcal');
    const names = sl.items.map(it=>{const i=ING.find(x=>x.id===it.id); return i?i.nm:'';}).filter(Boolean).join(', ');
    return `<div class="plate-item">
      <div class="pn"><b>${r?r.name:MEALS[sl.meal].label}</b>${r&&r.effort?` <span class="buy" style="color:var(--muted);border-color:var(--line)">${r.effort}m</span>`:''}
        <small>${round1(p)}g P · ${Math.round(kc)} kcal · ${names}</small></div>
      <button class="add" data-loadslot="${sl.id}" style="padding:5px 10px">Load</button>
    </div>`; }).join('');

  // the other meals are context, not a decision you make from here — one line, not four rows
  const others = today.filter(s=>s.meal!==state.meal)
    .sort((a,b)=>Object.keys(MEALS).indexOf(a.meal)-Object.keys(MEALS).indexOf(b.meal))
    .map(sl=>{ const r=RECIPES.find(x=>x.id===sl.recipe);
      return `${MEALS[sl.meal].label}${r?`: ${r.name}`:''}`; }).join(' · ');

  return (rows
      ? `<p class="focus-note">🗓️ <b>Planned</b> for your ${MEALS[state.meal].label.toLowerCase()} — one tap loads it:</p>${rows}`
      : '') +
    (others ? `<p class="focus-note" style="margin-top:${rows?'10':'0'}px">🗓️ Also planned today · ${others}</p>` : '') +
    (prep.length ? `<div class="flags" style="margin-top:10px"><span class="flag miss">🌱 needs prep ahead: ${prep.map(i=>`${i.nm} (${i.prep})`).join(' · ')}</span></div>` : '') +
    (rows ? `<p class="focus-note" style="margin-top:14px">…or build it yourself:</p>` : '');
}
function loadSlot(id){
  const sl = MENU.find(x=>x.id===id); if(!sl) return;
  state.meal = sl.meal;
  state.plate = sl.items.map(x=>({...x}));
  state.focus='protein'; clearSearch();
  window.scrollTo(0,0); render();
}

function renderRecipes(){
  const el=$('#recipes'); if(!el) return;
  const plateIds=state.plate.map(p=>p.id);
  if(!plateIds.length){ el.innerHTML=`<div class="empty">Add ingredients and I'll suggest dishes that use them.</div>`; return; }
  const onPlate=id=>plateIds.includes(id);
  const ing=id=>ING.find(x=>x.id===id);
  const nm=id=>{const i=ing(id); return i?i.nm:id;};
  const buyTag=id=>{const i=ing(id); if(!i) return '';
    return i.makes ? ' <span class="buy">prep</span>' : (needsBuy(i) ? ' <span class="buy">buy</span>' : '');};
  const fits=r=>fitsMeal(r,state.meal)?1:0;

  const {chosen, bases, finish, leftover} = composePlate(plateIds, state.meal);

  let html='';
  if(chosen.length){
    html += `<div class="rlbl">This plate makes</div>` + chosen.map(r=>{
      const uses=r.core.filter(onPlate).concat(r.opt.filter(id=>onPlate(id)&&r.core.indexOf(id)<0));
      return `<div class="recipe">
        <div class="rhead"><b>${r.name}</b><span class="fit">✓ ready${r.user?` · <span class="radd-link" data-delrecipe="${r.id}">remove</span>`:''}</span></div>
        <div class="rmethod">${r.method}</div>
        <div class="ruses">uses: ${uses.map(nm).join(', ')}</div>
      </div>`;
    }).join('');
    if(bases.length)   html += `<div class="ruses" style="margin:2px 0 8px">served with: ${bases.map(nm).join(', ')}</div>`;
    if(finish.length)  html += `<div class="rfinish" style="margin-bottom:8px">finish: ${finish.map(i=>`${i.nm} <span style="opacity:.7">(${ROLE_VERB[i.role]})</span>`).join(' · ')}</div>`;
    if(leftover.length)html += `<div class="ruses" style="color:var(--muted);margin-bottom:8px">also on plate: ${leftover.map(i=>i.nm).join(', ')} <span style="opacity:.7">— no dish yet</span></div>`;
  }

  // 2) CLOSE — dishes you could make by adding 1-2 things (clickable)
  const close=RECIPES.filter(r=>!chosen.includes(r))
    .map(r=>({r, on:r.core.filter(onPlate), missing:r.core.filter(id=>!onPlate(id))}))
    .filter(x=>x.on.length>0 && x.missing.length>=1 && x.missing.length<=2)
    .sort((a,b)=>(b.on.length-a.on.length)||(a.missing.length-b.missing.length)||(fits(b.r)-fits(a.r)))
    .slice(0,3);
  if(close.length){
    html += `<div class="rlbl" style="margin-top:6px">Close — add to make</div>` + close.map(({r,on,missing})=>`<div class="recipe">
      <div class="rhead"><b>${r.name}</b><span class="fit">have ${on.length}/${r.core.length}</span></div>
      <div class="rmethod">${r.method}</div>
      <div class="radd">add: ${missing.map(id=>`<span class="radd-link" data-add="${id}">＋ ${nm(id)}</span>${buyTag(id)}`).join(' ')}</div>
    </div>`).join('');
  }

  el.innerHTML = html || `<div class="empty">No dish matches yet — add a base or a protein.</div>`;
}
